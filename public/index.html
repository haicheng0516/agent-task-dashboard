<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent任务流控制台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1419;
            --bg-card: #1c2128;
            --bg-hover: #262c36;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
            --accent-yellow: #d29922;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            --border: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto 24px;
;
            padding:        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #4393e6;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        /* Stats Overview */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card .label {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card .value.green { color: var(--accent-green); }
        .stat-card .value.blue { color: var(--accent-blue); }
        .stat-card .value.yellow { color: var(--accent-yellow); }
        .stat-card .value.purple { color: var(--accent-purple); }

        /* Agent Cards */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .agent-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }

        .agent-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .agent-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .agent-role {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-hover);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.idle {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }

        .status-badge.working {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-blue);
        }

        .progress-bar {
            height: 8px;
            background: var(--bg-hover);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .task-section {
            margin-bottom: 16px;
        }

        .task-section h4 {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            padding: 10px 14px;
            background: var(--bg-hover);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-item::before {
            content: '○';
            color: var(--text-secondary);
        }

        .task-item.doing {
            background: rgba(88, 166, 255, 0.1);
            border-left: 3px solid var(--accent-blue);
        }

        .task-item.doing::before {
            content: '◐';
            color: var(--accent-blue);
            animation: spin 2s linear infinite;
        }

        .task-item.done {
            background: rgba(63, 185, 80, 0.1);
            opacity: 0.7;
        }

        .task-item.done::before {
            content: '✓';
            color: var(--accent-green);
        }

        .task-status {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }

        .task-status.pending {
            background: rgba(210, 153, 34, 0.2);
            color: var(--accent-yellow);
        }

        .task-status.completed {
            background: rgba(63, 185, 80, 0.2);
            color: var(--accent-green);
        }

        .task-status.in-progress {
            background: rgba(88, 166, 255, 0.2);
            color: var(--accent-blue);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .empty-state {
            color: var(--text-secondary);
            font-size: 13px;
            font-style: italic;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            transform: scale(0.9);
            transition: all 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 {
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
        }

        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* Workflow Section */
        .workflow-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-top: 32px;
        }

        .workflow-section h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .workflow-form {
            display: grid;
            gap: 16px;
        }

        .workflow-tasks {
            margin-top: 16px;
        }

        .workflow-task-row {
            display: grid;
            grid-template-columns: 150px 1fr auto;
            gap: 12px;
            margin-bottom: 12px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .btn-add {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }

        .btn-remove {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
        }

        /* Refresh indicator */
        .refresh-time {
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🚀 Agent任务流控制台</h1>
                <p class="refresh-time">最后更新: <span id="lastUpdate">-</span></p>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="refreshData()">🔄 刷新</button>
                <button class="btn-primary" onclick="openTaskModal()">+ 分配任务</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">总Agent数</div>
                <div class="value blue" id="totalAgents">0</div>
            </div>
            <div class="stat-card">
                <div class="label">进行中</div>
                <div class="value yellow" id="workingAgents">0</div>
            </div>
            <div class="stat-card">
                <div class="label">待办任务</div>
                <div class="value purple" id="totalTodos">0</div>
            </div>
            <div class="stat-card">
                <div class="label">已完成</div>
                <div class="value green" id="totalDone">0</div>
            </div>
        </div>

        <div class="agents-grid" id="agentsGrid">
            <!-- Agent cards will be rendered here -->
        </div>

        <div class="workflow-section">
            <h2>📋 创建工作流</h2>
            <div class="workflow-form">
                <div class="form-group">
                    <label>工作流名称</label>
                    <input type="text" id="workflowName" placeholder="例如: 用户登录功能开发">
                </div>
                <div class="workflow-tasks" id="workflowTasks">
                    <div class="workflow-task-row">
                        <select class="workflow-agent-select">
                            <option value="">选择Agent</option>
                        </select>
                        <input type="text" class="workflow-task-input" placeholder="任务描述...">
                        <button class="btn-icon btn-remove" onclick="removeWorkflowTask(this)">✕</button>
                    </div>
                </div>
                <button class="btn-secondary" onclick="addWorkflowTask()">+ 添加任务</button>
                <button class="btn-primary" onclick="createWorkflow()">🚀 执行工作流</button>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2>分配任务</h2>
            <div class="form-group">
                <label>选择Agent</label>
                <select id="taskAgent">
                    <option value="">请选择...</option>
                </select>
            </div>
            <div class="form-group">
                <label>任务描述</label>
                <textarea id="taskDesc" rows="4" placeholder="输入任务内容..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeTaskModal()">取消</button>
                <button class="btn-primary" onclick="submitTask()">分配</button>
            </div>
        </div>
    </div>

    <script>
        let agentsData = {};

        async function fetchAgents() {
            try {
                const res = await fetch('/api/agents');
                agentsData = await res.json();
                renderAgents();
                updateStats();
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
            } catch (e) {
                console.error('获取数据失败:', e);
            }
        }

        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = '';

            Object.entries(agentsData).forEach(([name, agent]) => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                
                const status = agent.status || 'idle';
                const progress = agent.progress || 0;
                const doing = agent.doing || '';
                const todo = agent.todo || [];
                const done = agent.done || [];

                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-info">
                            <h3>${agent.name || name}</h3>
                            <span class="agent-role">${agent.role || 'developer'}</span>
                        </div>
                        <span class="status-badge ${status}">${status === 'idle' ? '空闲' : '工作中'}</span>
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                    
                    <div class="task-section">
                        <h4>正在做</h4>
                        ${doing ? `<div class="task-item doing">${doing}</div>` : '<div class="empty-state">暂无</div>'}
                    </div>
                    
                    <div class="task-section">
                        <h4>真实任务</h4>
                        ${(agent.realTasks && agent.realTasks.length > 0) ? agent.realTasks.map(t => `
                            <div class="task-item ${t.status}">${t.title} <span class="task-status">(${t.status})</span></div>
                        `).join('') : '<div class="empty-state">暂无真实任务</div>'}
                    </div>
                    
                    <div class="task-section">
                        <h4>待办 (${todo.length})</h4>
                        ${todo.length > 0 ? todo.map(t => `
                            <div class="task-item">${t.task || t}</div>
                        `).join('') : '<div class="empty-state">暂无待办</div>'}
                    </div>
                    
                    <div class="task-section">
                        <h4>已完成 (${done.length})</h4>
                        ${done.length > 0 ? done.slice(0, 3).map(t => `
                            <div class="task-item done">${t.task || t}</div>
                        `).join('') : '<div class="empty-state">暂无已完成</div>'}
                    </div>
                `;
                
                grid.appendChild(card);
            });

            // Update selects
            updateSelects();
        }

        function updateSelects() {
            const agentNames = Object.keys(agentsData);
            
            document.querySelectorAll('#taskAgent, .workflow-agent-select').forEach(select => {
                const currentVal = select.value;
                select.innerHTML = '<option value="">选择Agent</option>' + 
                    agentNames.map(name => `<option value="${name}">${agentsData[name].name || name}</option>`).join('');
                if (agentNames.includes(currentVal)) select.value = currentVal;
            });
        }

        function updateStats() {
            const agents = Object.values(agentsData);
            const total = agents.length;
            const working = agents.filter(a => a.status !== 'idle').length;
            const todos = agents.reduce((sum, a) => sum + (a.todo?.length || 0), 0);
            const done = agents.reduce((sum, a) => sum + (a.done?.length || 0), 0);

            document.getElementById('totalAgents').textContent = total;
            document.getElementById('workingAgents').textContent = working;
            document.getElementById('totalTodos').textContent = todos;
            document.getElementById('totalDone').textContent = done;
        }

        function openTaskModal() {
            document.getElementById('taskModal').classList.add('active');
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('active');
            document.getElementById('taskAgent').value = '';
            document.getElementById('taskDesc').value = '';
        }

        async function submitTask() {
            const agent = document.getElementById('taskAgent').value;
            const task = document.getElementById('taskDesc').value;

            if (!agent || !task) {
                alert('请填写完整信息');
                return;
            }

            try {
                const res = await fetch(`/api/agents/${agent}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task })
                });
                
                if (res.ok) {
                    closeTaskModal();
                    refreshData();
                } else {
                    alert('分配失败');
                }
            } catch (e) {
                alert('错误: ' + e.message);
            }
        }

        function addWorkflowTask() {
            const container = document.getElementById('workflowTasks');
            const row = document.createElement('div');
            row.className = 'workflow-task-row';
            row.innerHTML = `
                <select class="workflow-agent-select">
                    <option value="">选择Agent</option>
                </select>
                <input type="text" class="workflow-task-input" placeholder="任务描述...">
                <button class="btn-icon btn-remove" onclick="removeWorkflowTask(this)">✕</button>
            `;
            container.appendChild(row);
            updateSelects();
        }

        function removeWorkflowTask(btn) {
            const rows = document.querySelectorAll('.workflow-task-row');
            if (rows.length > 1) {
                btn.parentElement.remove();
            }
        }

        async function createWorkflow() {
            const name = document.getElementById('workflowName').value;
            if (!name) {
                alert('请输入工作流名称');
                return;
            }

            const tasks = [];
            document.querySelectorAll('.workflow-task-row').forEach(row => {
                const agent = row.querySelector('.workflow-agent-select').value;
                const task = row.querySelector('.workflow-task-input').value;
                if (agent && task) {
                    tasks.push({ agent, task });
                }
            });

            if (tasks.length === 0) {
                alert('请至少添加一个任务');
                return;
            }

            try {
                const res = await fetch('/api/workflows', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, tasks })
                });

                if (res.ok) {
                    alert('工作流已创建并分发！');
                    document.getElementById('workflowName').value = '';
                    document.querySelectorAll('.workflow-task-input').forEach(i => i.value = '');
                    refreshData();
                } else {
                    alert('创建失败');
                }
            } catch (e) {
                alert('错误: ' + e.message);
            }
        }

        function refreshData() {
            fetchAgents();
        }

        // Auto refresh every 5 seconds
        fetchAgents();
        setInterval(fetchAgents, 5000);
    </script>
</body>
</html>
