<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent任务流控制台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #21262d;
            --bg-input: #0d1117;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent-green: #3fb950;
            --accent-green-dim: rgba(63, 185, 80, 0.15);
            --accent-blue: #58a6ff;
            --accent-blue-dim: rgba(88, 166, 255, 0.15);
            --accent-yellow: #d29922;
            --accent-yellow-dim: rgba(210, 153, 34, 0.15);
            --accent-red: #f85149;
            --accent-red-dim: rgba(248, 81, 73, 0.15);
            --accent-purple: #a371f7;
            --accent-purple-dim: rgba(163, 113, 247, 0.15);
            --border: #30363d;
            --border-light: #21262d;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(88, 166, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(163, 113, 247, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .refresh-indicator {
            font-size: 13px;
            color: var(--text-muted);
            margin-right: 8px;
        }

        button {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #4393e6);
            color: white;
            box-shadow: 0 2px 8px rgba(88, 166, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .stat-card.blue::before { background: var(--accent-blue); }
        .stat-card.green::before { background: var(--accent-green); }
        .stat-card.yellow::before { background: var(--accent-yellow); }
        .stat-card.purple::before { background: var(--accent-purple); }

        .stat-card .icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .stat-card.blue .icon { background: var(--accent-blue-dim); }
        .stat-card.green .icon { background: var(--accent-green-dim); }
        .stat-card.yellow .icon { background: var(--accent-yellow-dim); }
        .stat-card.purple .icon { background: var(--accent-purple-dim); }

        .stat-card .label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-card.blue .value { color: var(--accent-blue); }
        .stat-card.green .value { color: var(--accent-green); }
        .stat-card.yellow .value { color: var(--accent-yellow); }
        .stat-card.purple .value { color: var(--accent-purple); }

        /* Section Title */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent-blue);
            border-radius: 2px;
        }

        /* Agent Grid */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }

        .agent-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
        }

        .agent-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .agent-card.idle {
            opacity: 0.7;
        }

        .agent-card.working {
            border-color: var(--accent-blue);
        }

        .agent-card.working::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .agent-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .agent-avatar {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
        }

        .agent-avatar.backend { background: linear-gradient(135deg, #7c3aed, #a855f7); }
        .agent-avatar.frontend { background: linear-gradient(135deg, #0ea5e9, #38bdf8); }
        .agent-avatar.qa { background: linear-gradient(135deg, #10b981, #34d399); }
        .agent-avatar.devops { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
        .agent-avatar.product { background: linear-gradient(135deg, #ec4899, #f472b6); }
        .agent-avatar.ios { background: linear-gradient(135deg, #ef4444, #f87171); }
        .agent-avatar.main { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); }

        .agent-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .agent-role {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-badge.idle {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .status-badge.idle::before {
            background: var(--text-muted);
        }

        .status-badge.working {
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
        }

        .status-badge.working::before {
            background: var(--accent-blue);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Progress */
        .progress-section {
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .progress-value {
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-hover);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* Task Sections */
        .task-section {
            margin-bottom: 16px;
        }

        .task-section h4 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-section h4 .count {
            background: var(--bg-hover);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            padding: 12px 16px;
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .task-item:hover {
            background: var(--bg-input);
        }

        .task-item .icon {
            font-size: 12px;
            width: 20px;
            text-align: center;
        }

        .task-item.doing {
            background: var(--accent-blue-dim);
            border-left-color: var(--accent-blue);
        }

        .task-item.doing .icon {
            color: var(--accent-blue);
            animation: spin 2s linear infinite;
        }

        .task-item.done {
            background: var(--accent-green-dim);
            border-left-color: var(--accent-green);
            opacity: 0.7;
        }

        .task-item.done .icon {
            color: var(--accent-green);
        }

        .task-item.pending {
            background: var(--accent-yellow-dim);
            border-left-color: var(--accent-yellow);
        }

        .task-item.pending .icon {
            color: var(--accent-yellow);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .empty-state {
            color: var(--text-muted);
            font-size: 13px;
            padding: 12px 16px;
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            font-style: italic;
        }

        /* Workflow Section */
        .workflow-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        .workflow-section h2 {
            font-size: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .workflow-form {
            display: grid;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--accent-blue-dim);
        }

        .workflow-tasks {
            margin-top: 8px;
        }

        .workflow-task-row {
            display: grid;
            grid-template-columns: 180px 1fr auto;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        .workflow-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
        }

        .btn-add {
            background: var(--accent-green-dim);
            color: var(--accent-green);
        }

        .btn-add:hover {
            background: var(--accent-green);
            color: white;
        }

        .btn-remove {
            background: var(--accent-red-dim);
            color: var(--accent-red);
        }

        .btn-remove:hover {
            background: var(--accent-red);
            color: white;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            width: 90%;
            max-width: 480px;
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal h2 {
            font-size: 20px;
            margin-bottom: 24px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 28px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .agents-grid {
                grid-template-columns: 1fr;
            }

            .workflow-task-row {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo">🤖</div>
                <div>
                    <h1>Agent任务流控制台</h1>
                    <p class="header-subtitle">实时监控多Agent工作状态与任务分配</p>
                </div>
            </div>
            <div class="header-actions">
                <span class="refresh-indicator">每5秒自动刷新</span>
                <button class="btn-secondary" onclick="refreshData()">🔄 刷新</button>
                <button class="btn-primary" onclick="openTaskModal()">➕ 分配任务</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card blue">
                <div class="icon">👥</div>
                <div class="label">总 Agent 数</div>
                <div class="value" id="totalAgents">0</div>
            </div>
            <div class="stat-card yellow">
                <div class="icon">⚡</div>
                <div class="label">工作中</div>
                <div class="value" id="workingAgents">0</div>
            </div>
            <div class="stat-card purple">
                <div class="icon">📋</div>
                <div class="label">待办任务</div>
                <div class="value" id="totalTodos">0</div>
            </div>
            <div class="stat-card green">
                <div class="icon">✅</div>
                <div class="label">已完成</div>
                <div class="value" id="totalDone">0</div>
            </div>
        </div>

        <h2 class="section-title">Agent 状态监控</h2>
        
        <div class="agents-grid" id="agentsGrid">
            <!-- Agent cards will be rendered here -->
        </div>

        <div class="workflow-section">
            <h2>🚀 创建工作流</h2>
            <div class="workflow-form">
                <div class="form-group">
                    <label>工作流名称</label>
                    <input type="text" id="workflowName" placeholder="例如: 用户登录功能开发">
                </div>
                <div class="workflow-tasks" id="workflowTasks">
                    <div class="workflow-task-row">
                        <select class="workflow-agent-select">
                            <option value="">选择 Agent...</option>
                        </select>
                        <input type="text" class="workflow-task-input" placeholder="任务描述...">
                        <button class="btn-icon btn-remove" onclick="removeWorkflowTask(this)">✕</button>
                    </div>
                </div>
                <div class="workflow-actions">
                    <button class="btn-secondary" onclick="addWorkflowTask()">➕ 添加任务</button>
                    <button class="btn-primary" onclick="createWorkflow()">🚀 执行工作流</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2>分配新任务</h2>
            <div class="form-group">
                <label>选择 Agent</label>
                <select id="taskAgent">
                    <option value="">请选择...</option>
                </select>
            </div>
            <div class="form-group">
                <label>任务描述</label>
                <textarea id="taskDesc" rows="4" placeholder="输入任务内容..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeTaskModal()">取消</button>
                <button class="btn-primary" onclick="submitTask()">确认分配</button>
            </div>
        </div>
    </div>

    <script>
        let agentsData = {};
        const roleIcons = {
            'coordinator': 'main',
            'developer': 'backend',
            'tester': 'qa',
            'ops': 'devops',
            'pm': 'product'
        };

        async function fetchAgents() {
            try {
                const res = await fetch('/api/agents');
                agentsData = await res.json();
                renderAgents();
                updateStats();
                document.getElementById('lastUpdate') && (document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN'));
            } catch (e) {
                console.error('获取数据失败:', e);
            }
        }

        function getAvatarClass(role) {
            return roleIcons[role] || 'main';
        }

        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            grid.innerHTML = '';

            Object.entries(agentsData).forEach(([name, agent]) => {
                const status = agent.status || 'idle';
                const progress = agent.progress || 0;
                const doing = agent.doing || '';
                const todo = agent.todo || [];
                const done = agent.done || [];
                const realTasks = agent.realTasks || [];

                const card = document.createElement('div');
                card.className = `agent-card ${status}`;

                // 计算真实任务统计
                const pendingTasks = realTasks.filter(t => t.status === 'pending');
                const completedTasks = realTasks.filter(t => t.status === 'completed');
                const inProgressTasks = realTasks.filter(t => t.status === 'in-progress');

                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-info">
                            <div class="agent-avatar ${getAvatarClass(agent.role)}">${(agent.name || name).charAt(0)}</div>
                            <div>
                                <h3>${agent.name || name}</h3>
                                <span class="agent-role">${getRoleLabel(agent.role)}</span>
                            </div>
                        </div>
                        <span class="status-badge ${status}">${status === 'idle' ? '空闲' : '工作中'}</span>
                    </div>
                    
                    <div class="progress-section">
                        <div class="progress-header">
                            <span class="progress-label">项目进度</span>
                            <span class="progress-value">${progress}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    
                    ${doing ? `
                    <div class="task-section">
                        <h4>⚡ 正在执行</h4>
                        <div class="task-item doing">
                            <span class="icon">◐</span>
                            ${doing}
                        </div>
                    </div>
                    ` : ''}
                    
                    ${realTasks.length > 0 ? `
                    <div class="task-section">
                        <h4>📋 真实任务 <span class="count">${realTasks.length}</span></h4>
                        ${realTasks.slice(0, 2).map(t => `
                            <div class="task-item ${t.status}">
                                <span class="icon">${t.status === 'completed' ? '✓' : t.status === 'pending' ? '○' : '◐'}</span>
                                ${t.title}
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}
                    
                    <div class="task-section">
                        <h4>📝 待办 <span class="count">${todo.length + pendingTasks.length}</span></h4>
                        ${todo.length > 0 ? todo.slice(0, 2).map(t => `
                            <div class="task-item pending">
                                <span class="icon">○</span>
                                ${t.task || t}
                            </div>
                        `).join('') : '<div class="empty-state">暂无待办</div>'}
                    </div>
                    
                    <div class="task-section">
                        <h4>✅ 已完成 <span class="count">${done.length + completedTasks.length}</span></h4>
                        ${(done.length + completedTasks.length) > 0 ? [...done, ...completedTasks].slice(0, 2).map(t => `
                            <div class="task-item done">
                                <span class="icon">✓</span>
                                ${t.task || t.title || t}
                            </div>
                        `).join('') : '<div class="empty-state">暂无已完成</div>'}
                    </div>
                `;
                
                grid.appendChild(card);
            });

            updateSelects();
        }

        function getRoleLabel(role) {
            const labels = {
                'coordinator': '协调者',
                'developer': '开发者',
                'tester': '测试工程师',
                'ops': '运维工程师',
                'pm': '产品经理'
            };
            return labels[role] || role;
        }

        function updateSelects() {
            const agentNames = Object.keys(agentsData);
            
            document.querySelectorAll('#taskAgent, .workflow-agent-select').forEach(select => {
                const currentVal = select.value;
                const isWorkflow = select.classList.contains('workflow-agent-select');
                select.innerHTML = (isWorkflow ? '<option value="">选择 Agent...</option>' : '<option value="">请选择...</option>') + 
                    agentNames.map(name => `<option value="${name}">${agentsData[name].name || name}</option>`).join('');
                if (agentNames.includes(currentVal)) select.value = currentVal;
            });
        }

        function updateStats() {
            const agents = Object.values(agentsData);
            const total = agents.length;
            const working = agents.filter(a => a.status !== 'idle').length;
            const todos = agents.reduce((sum, a) => sum + (a.todo?.length || 0) + (a.realTasks?.filter(t => t.status === 'pending').length || 0), 0);
            const done = agents.reduce((sum, a) => sum + (a.done?.length || 0) + (a.realTasks?.filter(t => t.status === 'completed').length || 0), 0);

            document.getElementById('totalAgents').textContent = total;
            document.getElementById('workingAgents').textContent = working;
            document.getElementById('totalTodos').textContent = todos;
            document.getElementById('totalDone').textContent = done;
        }

        function openTaskModal() {
            document.getElementById('taskModal').classList.add('active');
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('active');
            document.getElementById('taskAgent').value = '';
            document.getElementById('taskDesc').value = '';
        }

        async function submitTask() {
            const agent = document.getElementById('taskAgent').value;
            const task = document.getElementById('taskDesc').value;

            if (!agent || !task) {
                alert('请填写完整信息');
                return;
            }

            try {
                const res = await fetch(`/api/agents/${agent}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task })
                });
                
                if (res.ok) {
                    closeTaskModal();
                    refreshData();
                } else {
                    alert('分配失败');
                }
            } catch (e) {
                alert('错误: ' + e.message);
            }
        }

        function addWorkflowTask() {
            const container = document.getElementById('workflowTasks');
            const row = document.createElement('div');
            row.className = 'workflow-task-row';
            row.innerHTML = `
                <select class="workflow-agent-select">
                    <option value="">选择 Agent...</option>
                </select>
                <input type="text" class="workflow-task-input" placeholder="任务描述...">
                <button class="btn-icon btn-remove" onclick="removeWorkflowTask(this)">✕</button>
            `;
            container.appendChild(row);
            updateSelects();
        }

        function removeWorkflowTask(btn) {
            const rows = document.querySelectorAll('.workflow-task-row');
            if (rows.length > 1) {
                btn.parentElement.remove();
            }
        }

        async function createWorkflow() {
            const name = document.getElementById('workflowName').value;
            if (!name) {
                alert('请输入工作流名称');
                return;
            }

            const tasks = [];
            document.querySelectorAll('.workflow-task-row').forEach(row => {
                const agent = row.querySelector('.workflow-agent-select').value;
                const task = row.querySelector('.workflow-task-input').value;
                if (agent && task) {
                    tasks.push({ agent, task });
                }
            });

            if (tasks.length === 0) {
                alert('请至少添加一个任务');
                return;
            }

            try {
                const res = await fetch('/api/workflows', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, tasks })
                });

                if (res.ok) {
                    alert('工作流已创建并分发！');
                    document.getElementById('workflowName').value = '';
                    document.querySelectorAll('.workflow-task-input').forEach(i => i.value = '');
                    refreshData();
                } else {
                    alert('创建失败');
                }
            } catch (e) {
                alert('错误: ' + e.message);
            }
        }

        function refreshData() {
            fetchAgents();
        }

        // Auto refresh every 5 seconds
        fetchAgents();
        setInterval(fetchAgents, 5000);
    </script>
</body>
</html>
